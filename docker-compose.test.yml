services:
  test-postgres:
    image: postgres:16-alpine
    container_name: leader_api_test_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: LeaderAPI_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d LeaderAPI_test"]
      interval: 2s
      timeout: 5s
      retries: 30

  test-redis:
    image: redis:7-alpine
    container_name: leader_api_test_redis
    restart: unless-stopped
    ports:
      - "6389:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 30

  test-minio:
    image: minio/minio:latest
    container_name: leader_api_test_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9009:9000"
      - "9099:9001"
    volumes:
      - minio_test_data:/data

volumes:
  postgres_test_data:
  redis_test_data:
  minio_test_data:
